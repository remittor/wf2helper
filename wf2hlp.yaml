udp_port: 23123

keys:
    up_shift: a
    down_shift: z

overlays:
    leaderboard:
        show: true
        max_rows: 26           # max participants shown + header lines
        x: 20                  # screen position, pixels from left
        y: 400                 # screen position, pixels from top
        bg_alpha: 0.3          # opacity of background panel (shown during COUNTDOWN/RACING only)
        bg_color: "#111111"    # background panel colour        # transparency: 0.0 = invisible, 1.0 = opaque
        alpha: 0.82
        bg: "#000001"          # background colour (ignored when transparent: true)
        font_size: 9
        font: "Fixedsys"
        bold: false
        shadow: "#000000"
        fg: "#ffffff"
        fg_player: "#ffdd44"
        fg_dnf: "#888888"

    advinfo:
        show: true
        max_rows: 20
        x: 20
        y: 820
        bg_alpha: 0.3
        bg_color: "#111111"
        alpha: 0.82
        bg: "#000001"
        font_size: 9
        font: "Fixedsys"
        bold: false
        shadow: "#000000"
        fg: "#ffffff"
        fg_player: "#ffffff"

    taildist:
        show: true
        # --- Window ---
        canvas_height: 200       # canvas height in pixels
        bg_alpha: 0.5            # for output ellipses
        alpha: 1.0               # for output text
        font_size: 14
        font: "Terminal"
        bold: false
        shadow: "#000000"        # rival name text shadow colour
        fg: "#ffffff"            # rival name text colour
        # --- Colours (gradient far->near) ---
        color_far:     "#e0e0e0" # colour at max_view_radius * 80% (farthest visible)
        color_near:    "#0055ff" # colour at distance 0 (closest)
        outline_color: "#000000" # ellipse outline colour
        # --- Geometry ---
        max_view_radius: 80.0    # rivals beyond this distance (m) are ignored
        fov: 90                  # horizontal field of view in degrees (120 = comfortable)
        marker_width: 0.5        # horiz_r = vert_r * marker_width
        max_rivals: 8            # max number of rivals shown (closest ones kept)
        max_delta_ms: 15000      # ignore rivals more than this ms behind (15 sec)
        poll_interval: 20        # overlay redraw interval in ms (lower = smoother but more CPU)

# overlays.taildist section above activates the TailDist overlay.
# The window is positioned automatically at the bottom of the game window.

auto_shifter:
    landing_settle_ms: 400  # wait after landing before shifting, ms
    airdownshift: { g5: 4, g4: 3 }  # while airborne, shift down to target gear (step by step).
    key_hold_ms: 70
    cooldown_ms: 350
    up_shift_rules:
        rpm: { g12: 0.95, g23: 0.95, g34: 0.95, g45: 0.95, g56: 0.95 }  # fraction of rpmRedline → shift up
    down_shift_rules:
        rpm: { g21: 0.40, g32: 0.40, g43: 0.40, g54: 0.40, g65: 0.40 }  # fraction of rpmRedline → shift down

    # Per-car overrides. Key = carName lowercase (partial match not supported,
    # must be exact lowercase carName as reported in telemetry).
    car_settings:
        rammer:
            cooldown_ms: 360
            up_shift_rules:
                rpm: { g12: 0.95, g23: 0.95, g34: 0.95, g45: 0.95 }
            down_shift_rules:
                rpm: { g21: 0.40, g32: 0.40, g43: 0.40, g54: 0.40 }

